<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bryson’s Utah Road Ready</title><style>
:root{--ink:#112840;--blue:#2265e5;--green:#198754;--bg:#f5f8fc;--line:#dce5ef;--muted:#63758b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.45 system-ui,-apple-system,sans-serif}.app{max-width:960px;margin:auto;padding:18px 16px 64px}.nav{display:flex;justify-content:space-between;align-items:center}.brand{font-weight:900;font-size:18px}.chip{padding:7px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:800}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 8px 30px #162c4810}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin:18px 0}.hero h1{font-size:clamp(30px,5vw,48px);letter-spacing:-1.6px;line-height:1.05;margin:7px 0}.eyebrow{color:var(--blue);font-weight:850;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.muted{color:var(--muted)}.btn{border:0;border-radius:12px;padding:12px 15px;font-weight:850;font:inherit;cursor:pointer}.primary{background:var(--blue);color:#fff}.soft{background:#e9f1ff;color:#1a54bd}.plain{background:#fff;border:1px solid var(--line)}.row{display:flex;gap:9px;flex-wrap:wrap}.ring{--p:0;width:145px;height:145px;border-radius:50%;margin:auto;background:conic-gradient(var(--green) calc(var(--p)*1%),#e9eef4 0);padding:12px}.ring div{height:100%;border-radius:50%;background:white;display:grid;place-content:center;text-align:center}.ring b{font-size:34px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.stat{padding:15px}.stat b{font-size:22px;display:block}.stat small{color:var(--muted)}h2{font-size:20px;margin:28px 0 10px}.modes,.topics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mode,.topic{text-align:left;min-height:108px}.mode b,.topic b{display:block;margin:6px 0}.bar{height:7px;border-radius:8px;background:#e7edf5;overflow:hidden;margin-top:10px}.bar i{display:block;height:100%;background:var(--blue)}.session{max-width:720px;margin:24px auto}.top{display:flex;align-items:center;gap:12px;margin-bottom:13px}.progress{height:9px;background:#e7edf5;flex:1;border-radius:9px}.progress i{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:9px}.question h1{font-size:28px;line-height:1.18}.options{display:grid;gap:9px}.option{padding:14px;text-align:left;background:white;border:1px solid var(--line);border-radius:12px;font-weight:700;cursor:pointer}.option.correct{border-color:#74c99c;background:#edfbf2}.option.wrong{border-color:#efabab;background:#fff3f3}.feedback{display:none;margin-top:16px;padding:14px;background:#eff5ff;border-radius:13px}.feedback.show{display:block}.source{font-size:12px;color:var(--muted);margin-top:8px}.report{background:#f0f6ff;border-radius:14px;padding:15px;margin:14px 0}.breakdown{display:grid;grid-template-columns:1fr 150px 44px;gap:8px;align-items:center;font-size:13px;margin:8px 0}@media(max-width:700px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.modes,.topics{grid-template-columns:1fr 1fr}}@media(max-width:420px){.modes,.topics{grid-template-columns:1fr}.question h1{font-size:24px}}
</style></head><body><div class="app"><nav class="nav"><div class="brand">⌁ Bryson’s Utah Road Ready</div><div class="chip">⚡ <span id="xp">0</span> XP</div></nav><main id="app"></main><p class="muted" style="font-size:12px">Unofficial study tool. Content verified July 14, 2026 against Utah Driver Handbook REV 3.2026.</p></div><script src="data/questions.js"></script><script src="data/reviewed-questions.js"></script><script>
const Q=window.REVIEWED_QUESTIONS,KEY='bryson-road-ready-engine-v1',cats=[...new Set(Q.map(q=>q.category))],BLUEPRINT={'Permit & licensing':4,'Vehicle safety':4,'Driving fundamentals':6,'Rules of the road':10,'Signs & signals':6,'School & rail':3,'Sharing the road':6,'Impairment & safety':3,'Emergencies & conditions':5,'Crashes & responsibility':3};
const base={xp:0,history:{},sessions:[],exams:[],recent:[],streak:0,lastDay:''};let s=load(),run=null,i=0,answers=[],locked=false;const $=x=>document.querySelector(x);function load(){try{return {...base,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch{return structuredClone(base)}}function save(){localStorage.setItem(KEY,JSON.stringify(s))}function stats(c){let a=0,n=0;Q.filter(q=>q.category===c).forEach(q=>{let h=s.history[q.id];if(h){a+=h.a;n+=h.n}});return{a,n,p:a?Math.round(100*n/a):0}}function due(q){let h=s.history[q.id];return !h||Date.now()>h.due}function weak(c){let z=stats(c);return z.a?100-z.p:100}function retention(){let seen=Q.filter(q=>s.history[q.id]);if(!seen.length)return 0;return Math.round(100*seen.filter(q=>s.history[q.id].n/s.history[q.id].a>=.8).length/seen.length)}function readiness(){let total=Object.values(s.history).reduce((n,h)=>n+h.a,0),coverage=cats.filter(c=>stats(c).a>=8).length/cats.length,low=Math.min(...cats.map(c=>stats(c).a?stats(c).p:0)),recent=s.exams.slice(-3),exam=recent.length?recent.reduce((n,x)=>n+x.pct,0)/recent.length:0;if(total<40)return{score:0,label:'Establishing baseline',why:'Answer 40 questions before readiness is estimated.'};let score=Math.round(Math.min(100,coverage*30+retention()*.2+low*.2+(total?Object.values(s.history).reduce((n,h)=>n+h.n,0)/total*100:0)*.15+exam*.15));let ready=total>=150&&coverage===1&&retention()>=80&&low>=75&&recent.length>=2&&recent.every(x=>x.pct>=80);let strong=ready&&recent.length>=3&&recent.slice(-3).every(x=>x.pct>=90);return{score,label:strong?'Strongly test ready':ready?'Test ready':score>=70?'Nearly ready':'Building consistency',why:ready?'Multiple exams, coverage, delayed retention, and weakest-topic results meet the gate.':`Needs: ${total<150?'150 answers ':''}${coverage<1?'all topics sampled ':''}${retention()<80?'stronger retention ':''}${low<75?'a 75% weakest topic ':''}${recent.length<2?'two recent practice exams ':''}`.trim()}}
function choose(count,mode='smart',category){let pool=category?Q.filter(q=>q.category===category):[...Q];if(mode==='review')pool=pool.filter(due);let recent=new Set(s.recent.slice(-30));let score=q=>{let h=s.history[q.id],z=stats(q.category);if(recent.has(q.id))return-999;let lapse=h?h.a-h.n:1,age=h?Math.min(1,(Date.now()-h.last)/864e5/7):1;return lapse*5+age*2+weak(q.category)/100+(due(q)?1:0)+Math.random()*.1};return pool.sort((a,b)=>score(b)-score(a)).slice(0,count)}function exam(){let used=new Set(s.recent.slice(-50)),out=[];for(let [c,n] of Object.entries(BLUEPRINT)){let pool=Q.filter(q=>q.category===c&&!used.has(q.id));if(pool.length<n)pool=Q.filter(q=>q.category===c);out.push(...pool.sort(()=>Math.random()-.5).slice(0,n))}return out.sort(()=>Math.random()-.5)}
function touch(){let d=new Date().toDateString(),y=new Date(Date.now()-864e5).toDateString();if(s.lastDay!==d){s.streak=s.lastDay===y?s.streak+1:1;s.lastDay=d}}function dashboard(){let r=readiness(),total=Object.values(s.history).reduce((n,h)=>n+h.a,0),correct=Object.values(s.history).reduce((n,h)=>n+h.n,0);$('#xp').textContent=s.xp;$('#app').innerHTML=`<section class="hero"><article class="card"><div class="eyebrow">Assessment engine</div><h1>Study what will make the difference.</h1><p class="muted">Smart Practice prioritizes weak, overdue, and unseen material without repeating recent questions. Practice exams use the fixed 50-question Utah blueprint.</p><div class="row"><button class="btn primary" onclick="start('smart')">Smart Practice</button><button class="btn soft" onclick="start('exam')">50-question Practice Exam</button><button class="btn plain" onclick="start('review')">Due Review</button></div></article><aside class="card"><div class="ring" style="--p:${r.score}"><div><b>${r.score}%</b><small>readiness</small></div></div><b>${r.label}</b><p class="muted">${r.why}</p></aside></section><section class="stats"><div class="card stat"><b>${total}</b><small>answers</small></div><div class="card stat"><b>${total?Math.round(correct/total*100)+'%':'—'}</b><small>accuracy</small></div><div class="card stat"><b>${Q.filter(due).length}</b><small>due now</small></div><div class="card stat"><b>${s.streak}</b><small>day streak</small></div><div class="card stat"><b>${s.exams.length?s.exams[s.exams.length-1].pct+'%':'—'}</b><small>last exam</small></div></section><h2>Training map</h2><section class="topics">${cats.map(c=>{let z=stats(c);return`<button class="card topic" onclick="start('topic','${c}')"><b>${c}</b><small class="muted">${z.a?z.p+'% · '+z.a+' attempts':'New'}</small><div class="bar"><i style="width:${z.p}%"></i></div></button>`}).join('')}</section>`}function start(mode,category){touch();let items=mode==='exam'?exam():choose(mode==='smart'?10:mode==='review'?12:10,mode,category);if(!items.length)items=choose(10);run={mode,exam:mode==='exam',items};i=0;answers=[];show()}function show(){let q=run.items[i];$('#app').innerHTML=`<section class="session"><div class="top"><button class="btn plain" onclick="dashboard()">Exit</button><div class="progress"><i style="width:${i/run.items.length*100}%"></i></div><b>${i+1}/${run.items.length}</b></div><article class="card question"><div class="eyebrow">${run.exam?'Practice exam · no feedback':q.category}</div><h1>${q.question}</h1><div class="options">${q.options.map((x,j)=>`<button class="option" onclick="answer(${j})">${'ABCD'[j]}. ${x}</button>`).join('')}</div><div class="feedback" id="feedback"></div><div class="row" style="margin-top:16px"><button id="next" class="btn primary" style="display:none" onclick="next()">${i===run.items.length-1?'Results':'Next question'}</button></div></article></section>`}function answer(j){if(locked)return;locked=true;let q=run.items[i],ok=j===q.answer;answers.push({q,ok});if(run.exam){next();return}document.querySelectorAll('.option').forEach((b,k)=>{b.disabled=true;b.classList.add(k===q.answer?'correct':k===j?'wrong':'')});record(q,ok);let f=$('#feedback');f.className='feedback show';f.innerHTML=`<b>${ok?'Correct.':'Review this rule.'}</b><br>${q.explanation}<div class="source">${q.source}</div>`;$('#next').style.display='inline-block'}function record(q,ok){let h=s.history[q.id]||{a:0,n:0,interval:0};h.a++;if(ok)h.n++;h.last=Date.now();h.interval=ok?[1,3,7,14,30][Math.min(4,Math.max(0,(h.stage||0)))]:1;h.stage=ok?Math.min(4,(h.stage||0)+1):0;h.due=Date.now()+h.interval*864e5;s.history[q.id]=h;s.xp+=ok?10:3;s.recent=[q.id,...s.recent.filter(x=>x!==q.id)].slice(0,80);save()}function next(){i++;locked=false;if(i<run.items.length)show();else finish()}function finish(){if(run.exam)answers.forEach(x=>record(x.q,x.ok));let good=answers.filter(x=>x.ok).length,pct=Math.round(100*good/answers.length);if(run.exam)s.exams.push({date:Date.now(),pct,blueprint:BLUEPRINT});s.sessions.push({date:Date.now(),mode:run.mode,pct,count:answers.length});save();let groups={};answers.forEach(x=>{let g=groups[x.q.category]||{a:0,n:0};g.a++;g.n+=x.ok?1:0;groups[x.q.category]=g});let r=readiness();$('#app').innerHTML=`<section class="session"><article class="card"><div class="eyebrow">${run.exam?'Practice exam complete':'Session complete'}</div><h1>${good} of ${answers.length} correct · ${pct}%</h1><div class="report"><b>${r.label} · ${r.score}%</b><br><span class="muted">${r.why}</span></div>${Object.entries(groups).map(([c,g])=>`<div class="breakdown"><b>${c}</b><div class="bar"><i style="width:${g.n/g.a*100}%"></i></div><span>${Math.round(g.n/g.a*100)}%</span></div>`).join('')}<div class="row" style="margin-top:20px"><button class="btn primary" onclick="start('smart')">Smart Practice</button><button class="btn soft" onclick="start('review')">Due Review</button><button class="btn plain" onclick="dashboard()">Dashboard</button></div></article></section>`}dashboard();
</script><style>:root[data-theme="night"]{--ink:#e8f0fa;--bg:#101a27;--line:#314359;--muted:#aebfd1}:root[data-theme="night"] .card,:root[data-theme="night"] .option{background:#172536;color:#e8f0fa}:root[data-theme="snow"]{--blue:#2878b9;--green:#2d9bb0;--bg:#eef8fb}</style><script src="learning.js"></script><script src="data/handbook-pages.js"></script><script src="handbook.js"></script></body></html>
